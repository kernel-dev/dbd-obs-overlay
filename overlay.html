<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Barlow%20Condensed">
    <title>OBS Overlay</title>
    <style>
      body {
        margin: 0;
        font-family: "Barlow Condensed";
        background: black;
        color: white;
        padding: 20px;
      }

      .overlay {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        position: relative;
      }

      .overlay * {
        background-color: transparent;
      }

      .overlay div {
        border-radius: 8px;
        padding: 4px 15px;
      }

      .tournament-name {
        font-size: 1.5em;
        font-weight: 400;
        color: #87ceeb;
        text-shadow: 0 0 5px rgba(135, 206, 235, 0.7);
        background-color: #1a202c;
        border: 2px solid #3d475c;
        border-bottom: none;
        border-radius: 0 12px 0 0 !important;
        padding: 8px 20px;
        margin-bottom: -2px;
        position: relative;
        z-index: 3;
        box-shadow: 0 -5px 10px rgba(61, 71, 92, 0.3);
        display: flex;
        align-items: center;
      }

      .teams {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: nowrap;
        max-width: 100%;
        background-color: #2b2d42;
        border: 3px solid #4a4e69;
        border-radius: 0 12px 12px 0px !important;
        box-shadow: none;
        padding: 0 !important;
        position: relative;
        z-index: 4;
        min-width: 200px;
        margin-bottom: -2px;
      }

      .team-wrapper {
        display: flex;
        align-items: center;
      }

      .team-name {
        font-size: 2.2em;
        font-weight: 400;
        color: #edf2f4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 8px 20px;
      }

      .team-name,
      .score {
        float: none;
        border-radius: 0px !important;
      }

      .scores-wrapper {
        display: flex;
        align-items: center;
        padding: 0 !important;
      }

      .score {
        font-size: 2.5em;
        font-weight: 600;
        color: #edf2f4;
        background-color: #6a6c80;
        padding: 8px 18px;
        border-radius: 0;
      }

      .score1 {
        border-right-color: #4a4e69 !important;
        border-right-width: 2px !important;
        border-right-style: solid !important;
      }

      .score2 {
        border-left-color: #4a4e69 !important;
        border-left-width: 2px !important;
        border-left-style: solid !important;
      }

      .remove-border {
        border: none !important;
      }

      .remove-border-radius {
        border-radius: 0px !important;
      }

      .force-border-right {
        border-top-right-radius: 8px !important;
        border-bottom-right-radius: 8px !important;
      }

      .win-condition-wrapper {
        font-size: 1.5em;
        color: #edf2f4;
        background-color: rgba(65, 90, 119, 0.9);
        padding: 6px 15px;
        border-radius: 0 0 12px 12px !important;
        border: 2px solid #4a4e69;
        border-top: none;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: -2px;
        box-shadow: 0 5px 10px rgba(65, 90, 119, 0.5);
        position: relative;
        z-index: 1;
      }

      .win-con-static {
        color: #e0b983;
        font-weight: 400;
        text-shadow: 0 0 1px rgba(255, 255, 255, 0.6);
        padding-left: 0 !important;
      }

      .win-condition {
        font-weight: 600;
        color: #e0b983;
        text-shadow: 0 0 3px rgba(224, 185, 131, 0.6);
      }

      #right-team {
        padding: 0 !important;
      }

      #left-team {
        padding: 0 !important;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="tournament-name" id="tournamentName">Tournament Name</div>
      <div class="teams" id="teams">
        <div class="team-wrapper" id="left-team">
          <div class="team-name" id="team1">Team 1</div>
        </div>
        <div class="scores-wrapper">
          <div class="score score1" id="score1">0</div>
          <div class="score score2" id="score2">0</div>
        </div>
        <div class="team-wrapper" id="right-team">
          <div class="team-name" id="team2">Team 2</div>
        </div>
      </div>
      <div class="win-condition-wrapper" id="win-condition-wrapper">
        <div class="win-con-static" id="winConditionStatic">Win Condition</div>
        <div class="win-condition" id="winCondition">4k1</div>
      </div>
    </div>

    <script>
      //=========================================
      //     FUNCTION FOR PARSING .INI FILES
      //=========================================
      function parseIniString(iniString) {
        const config = {};
        let currentSection = null;

        const lines = iniString.split("\n");

        for (const line of lines) {
          const trimmedLine = line.trim();

          if (
            trimmedLine.length === 0 ||
            trimmedLine.startsWith(";") ||
            trimmedLine.startsWith("#")
          ) {
            continue;
          }

          if (trimmedLine.startsWith("[") && trimmedLine.endsWith("]")) {
            currentSection = trimmedLine.substring(1, trimmedLine.length - 1);
            config[currentSection] = {};
          } else if (trimmedLine.includes("=")) {
            const parts = trimmedLine.split("=", 2);
            const key = parts[0].trim();
            const value = parts[1].split("#")[0].trim();

            if (currentSection) {
              config[currentSection][key] = value;
            } else {
              config[key] = value;
            }
          }
        }
        return config;
      }

      const adjustScale = () => {
        const winConWrapper = document.getElementById("win-condition-wrapper");
        const tourneyName = document.getElementById("tournamentName");

        const tourneyComputed = window.getComputedStyle(tourneyName);
        const winConComputed = window.getComputedStyle(winConWrapper);

        console.log(winConComputed.display, tourneyComputed.display);

        if (
          winConComputed.display == "none" ||
          tourneyComputed.display == "none"
        )
          return;

        //=========================================
        //         CALCULATE MAX ELEMENTS
        //=========================================
        let largerWidth = Math.max(
          tourneyName.offsetWidth,
          winConWrapper.offsetWidth
        );

        let largerHeight = Math.max(
          tourneyName.offsetHeight,
          winConWrapper.offsetHeight
        );

        //=========================================
        //        APPLY WIDTH ADJUSTMENTS
        //=========================================
        tourneyName.style.minWidth = `${
          largerWidth -
          parseFloat(tourneyComputed.paddingLeft) -
          parseFloat(tourneyComputed.paddingRight) -
          parseFloat(tourneyComputed.borderLeftWidth) -
          parseFloat(tourneyComputed.borderRightWidth)
        }px`;

        winConWrapper.style.minWidth = `${
          largerWidth -
          parseFloat(winConComputed.paddingLeft) -
          parseFloat(winConComputed.paddingRight) -
          parseFloat(winConComputed.borderLeftWidth) -
          parseFloat(winConComputed.borderRightWidth)
        }px`;

        //=========================================
        //         APPLY HEIGHT ADJUSTMENTS
        //=========================================
        tourneyName.style.minHeight = `${
          largerHeight -
          parseFloat(tourneyComputed.paddingTop) -
          parseFloat(tourneyComputed.paddingBottom) -
          parseFloat(tourneyComputed.borderTopWidth) -
          parseFloat(tourneyComputed.borderBottomWidth)
        }px`;

        winConWrapper.style.minHeight = `${
          largerHeight -
          parseFloat(winConComputed.paddingTop) -
          parseFloat(winConComputed.paddingBottom) -
          parseFloat(winConComputed.borderTopWidth) -
          parseFloat(winConComputed.borderBottomWidth)
        }px`;
      };

      const renderContent = ({
        tournamentName,
        firstTeam,
        firstScore,
        secondTeam,
        secondScore,
        winCondition,
        staticWinCondition,
        renderSecondTeam,
        renderFirstScore,
        renderWinCondition,
        hook,
      }) => {
        let data = {
          tournamentNameEl: document.getElementById("tournamentName"),
          team1El: document.getElementById("team1"),
          team2El: document.getElementById("team2"),
          score1El: document.getElementById("score1"),
          score2El: document.getElementById("score2"),
          winConditionEl: document.getElementById("winCondition"),
          staticWinConEl: document.getElementById("winConditionStatic"),
          winConWrapper: document.getElementById("win-condition-wrapper"),
          rightTeamEl: document.getElementById("right-team"),
          teamsEl: document.getElementById("teams"),
        };

        let {
          tournamentNameEl,
          team1El,
          team2El,
          score1El,
          score2El,
          winConditionEl,
          staticWinConEl,
          winConWrapper,
          rightTeamEl,
          teamsEl,
        } = data;

        tournamentNameEl.textContent = tournamentName;
        team1El.textContent = firstTeam;
        team2El.textContent = secondTeam;
        score1El.textContent = firstScore;
        score2El.textContent = secondScore;
        winConditionEl.textContent = winCondition;
        staticWinConEl.textContent = staticWinCondition;

        winConWrapper.style.display = !renderWinCondition ? "none" : "";

        if (!renderSecondTeam) {
          score1El.classList.add("remove-border");
          score2El.classList.add("remove-border");
          score2El.style.display = "none";
          rightTeamEl.style.display = "none";
        }

        if (!renderFirstScore) {
          score1El.classList.add("remove-border");
          teamsEl.classList.add("remove-border-radius");
          score1El.style.display = "none";
        }

        hook(data);
      };

      const renderTournamentData = (parsedContent) => {
        const filtered = parsedContent["Tournament"];

        let tournamentName = filtered["TournamentName"],
          firstTeam = filtered["FirstTeamName"],
          firstScore = filtered["FirstTeamScore"],
          secondTeam = filtered["SecondTeamName"],
          secondScore = filtered["SecondTeamScore"],
          winCondition = filtered["WinCondition"],
          staticWinCondition = "Win Condition";

        let renderSecondTeam = true;
        let renderFirstScore = true;
        let renderWinCondition = !!winCondition.length;

        renderContent({
          tournamentName,
          firstTeam,
          secondTeam,
          firstScore,
          secondScore,
          winCondition,
          staticWinCondition,
          renderSecondTeam,
          renderFirstScore,
          renderWinCondition,
          hook: () => {},
        });
      };

      const renderScrimData = (parsedContent) => {
        const filtered = parsedContent["Scrims"];

        let tournamentName = "Scrims",
          firstTeam = filtered["TeamOrKillerName"],
          firstScore,
          secondTeam,
          secondScore,
          winCondition,
          staticWinCondition;

        let renderWinCondition = false;
        let renderSecondTeam = false;
        let renderFirstScore = false;

        renderContent({
          tournamentName,
          firstTeam,
          firstScore,
          secondTeam,
          secondScore,
          winCondition,
          staticWinCondition,
          renderSecondTeam,
          renderFirstScore,
          renderWinCondition,
          hook: () => {},
        });
      };

      const renderOneVOneData = (parsedContent) => {
        const filtered = parsedContent["1v1"];

        let tournamentName = "1v1",
          firstTeam = filtered["FirstPlayerName"],
          firstScore = filtered["FirstPlayerScore"],
          secondTeam = filtered["SecondPlayerName"],
          secondScore = filtered["SecondPlayerScore"],
          winCondition = filtered["WinCondition"],
          staticWinCondition = "Win Condition";

        let renderSecondTeam = true;
        let renderFirstScore = true;
        let renderWinCondition = !!winCondition.length;

        renderContent({
          tournamentName,
          firstTeam,
          firstScore,
          secondTeam,
          secondScore,
          winCondition,
          staticWinCondition,
          renderSecondTeam,
          renderFirstScore,
          renderWinCondition,
          hook: () => {},
        });
      };

      const renderWinStreakData = (parsedContent) => {
        const filtered = parsedContent["Winstreak"];

        let tournamentName = filtered["TeamName"],
          firstTeam = "Current",
          firstScore = filtered["CurrentScore"],
          secondTeam,
          secondScore,
          winCondition = filtered["PersonalBest"],
          staticWinCondition = "PB";

        let renderSecondTeam = false;
        let renderFirstScore = true;
        let renderWinCondition = !!winCondition.length;

        let hookFunc = ({ teamsEl, score1El: firstScoreEl }) => {
          teamsEl.style.display = "flex";
          teamsEl.style.justifyContent = "space-between";

          firstScoreEl.classList.add("force-border-right");
        };

        renderContent({
          tournamentName,
          firstTeam,
          firstScore,
          secondTeam,
          secondScore,
          winCondition,
          staticWinCondition,
          renderSecondTeam,
          renderFirstScore,
          renderWinCondition,
          hook: hookFunc,
        });
      };

      let client = new XMLHttpRequest();

      client.open("GET", "/config.ini");

      client.onreadystatechange = () => {
        if (!client.responseText.length) return;

        const parsed = parseIniString(client.responseText);

        switch (parsed["CategoryInit"]["DesiredCategory"].toLowerCase()) {
          case "tournament":
            renderTournamentData(parsed);
            break;

          case "1v1":
            renderOneVOneData(parsed);
            break;

          case "scrims":
            renderScrimData(parsed);
            break;

          case "winstreak":
            renderWinStreakData(parsed);
            break;

          default:
            console.log("SOMETHING IS BROKEN!");
            break;
        }

        // adjustScale();
      };

      client.send();
    </script>
  </body>
</html>
