<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Overlay</title>
    <style>
      body {
        margin: 0;
        font-family: "SF Mono", monospace;
        background: black;
        color: white;
        padding: 20px;
      }

      .overlay {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        position: relative;
      }

      .overlay * {
        background-color: transparent;
      }

      .overlay div {
        border-radius: 8px;
        padding: 4px 15px;
      }

      .tournament-name {
        font-size: 1.3em;
        font-weight: 600;
        color: #87ceeb;
        text-shadow: 0 0 5px rgba(135, 206, 235, 0.7);
        background-color: #1a202c;
        border: 2px solid #3d475c;
        border-bottom: none;
        border-radius: 0 12px 0 0 !important;
        padding: 8px 20px;
        margin-bottom: -2px;
        position: relative;
        z-index: 3;
        align-self: flex-start;
        box-shadow: 0 -5px 10px rgba(61, 71, 92, 0.3);
      }

      .teams {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: nowrap;
        max-width: 100%;
        background-color: #2b2d42;
        border: 2px solid #4a4e69;
        border-radius: 0 12px 12px 0px !important;
        box-shadow: none;
        padding: 0 !important;
        position: relative;
        z-index: 4;
        min-width: 200px;
        margin-bottom: -2px;
      }

      .team-wrapper {
        display: flex;
        align-items: center;
      }

      .team-name {
        font-size: 2.2em;
        font-weight: 700;
        color: #edf2f4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 8px 20px;
      }

      .team-name,
      .score {
        float: none;
        border-radius: 0px !important;
      }

      .scores-wrapper {
        display: flex;
        align-items: center;
        padding: 0 !important;
      }

      .score {
        font-size: 2.5em;
        font-weight: 900;
        color: #edf2f4;
        background-color: #6a6c80;
        padding: 8px 18px;
        border-radius: 0;
      }

      .score1 {
        border-right-color: #4a4e69 !important;
        border-right-width: 2px !important;
        border-right-style: solid !important;
      }

      
      .score2 {
        border-left-color: #4a4e69 !important;
        border-left-width: 2px !important;
        border-left-style: solid !important;
      }

      .remove-border {
        border: none !important; 
      }

      .win-condition-wrapper {
        font-size: 1.5em;
        color: #edf2f4;
        background-color: rgba(65, 90, 119, 0.9);
        padding: 6px 15px;
        border-radius: 0 0 12px 12px !important;
        border: 2px solid #4a4e69;
        border-top: none;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: -2px;
        box-shadow: 0 5px 10px rgba(65, 90, 119, 0.5);
        position: relative;
        z-index: 1;
      }

      .win-con-static {
        color: #edf2f4;
        font-weight: 600;
        text-shadow: 0 0 1px rgba(255, 255, 255, 0.6);
      }

      .win-condition {
        font-weight: 900;
        color: #e0b983;
        text-shadow: 0 0 3px rgba(224, 185, 131, 0.6);
      }

      #right-team {
        padding: 0 !important;
      }

      #left-team {
        padding: 0 !important;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="tournament-name" id="tournamentName">Tournament Name</div>
      <div class="teams" id="teams">
        <div class="team-wrapper" id="left-team">
          <div class="team-name" id="team1">Team 1</div>
        </div>
        <div class="scores-wrapper">
          <div class="score score1" id="score1">0</div>
          <div class="score score2" id="score2">0</div>
        </div>
        <div class="team-wrapper" id="right-team">
          <div class="team-name" id="team2">Team 2</div>
        </div>
      </div>
      <div class="win-condition-wrapper" id="win-condition-wrapper">
        <div class="win-con-static" id="winConditionStatic">PB</div>
        <div class="win-condition" id="winCondition">winCondition</div>
      </div>
    </div>

    <script>
      const tournamentName = "Capsuna Winstreak";
      const team1 = "Current";
      const team2 = "";
      const score1 = 0;
      const score2 = 0;
      const winCondition = "3";

      const renderWinCondition = true;
      const renderSecondTeam = false;

      document.getElementById("tournamentName").textContent = tournamentName;
      document.getElementById("team1").textContent = team1;
      document.getElementById("team2").textContent = team2;
      document.getElementById("score1").textContent = score1;
      document.getElementById("score2").textContent = score2;
      document.getElementById("winCondition").textContent = winCondition;

      document.getElementById("win-condition-wrapper").style.display = !renderWinCondition ? "none" : "";
      
      if (!renderSecondTeam) {
        document.getElementById("score1").classList.add("remove-border");
        document.getElementById("score2").classList.add("remove-border");
        document.getElementById("teams").classList.add("remove-border");
        document.getElementById("score2").style.display = "none";
        document.getElementById("right-team").style.display = "none";
      }

      function measureTextWidth(text, font) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = font;
        return context.measureText(text).width;
      }

      const teamsDiv = document.getElementById("teams");
      const teamNames = [team1, team2];
      const fontSize = window.getComputedStyle(
        document.querySelector(".team-name")
      ).fontSize;
      const fontFamily = window.getComputedStyle(
        document.querySelector(".team-name")
      ).fontFamily;
      const font = `${fontSize} ${fontFamily}`;

      const longestWidth = Math.max(
        ...teamNames.map((name) => measureTextWidth(name, font))
      );

      const scoreWidth = measureTextWidth("00", font);
      const scaleFactor = 1.3;
      const adjustedWidth = (longestWidth + scoreWidth + 50) * scaleFactor;
    </script>
  </body>
</html>
